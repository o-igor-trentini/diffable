services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: diffable
    ports:
      - "5433:5432"
    volumes:
      - pgdata-dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: build
    command: go run github.com/air-verse/air@v1.61.7 -c .air.toml
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    environment:
      # Overrides .env value: uses Docker network hostname "db" instead of localhost
      DATABASE_URL: "postgres://postgres:postgres@db:5432/diffable?sslmode=disable"
      # More verbose logging for development
      LOG_LEVEL: "debug"

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "3000:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      VITE_API_URL: "/api/v1"
      VITE_API_PROXY_TARGET: "http://backend:8080"

volumes:
  pgdata-dev:
  frontend_node_modules:
