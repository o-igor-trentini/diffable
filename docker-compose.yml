services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: diffable
      POSTGRES_PASSWORD: diffable
      POSTGRES_DB: diffable
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U diffable"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: "8080"
      DATABASE_URL: "postgres://diffable:diffable@db:5432/diffable?sslmode=disable"
      FRONTEND_URL: "http://localhost:3000"
      LOG_LEVEL: "info"

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
